# Shaped reward: cup height weighted by proximity to the gripper.
# Harder to game; arm tends to stay near the cup.
reward: shaped_lift

env:
  n_waypoints: 6
  sim_seconds: 3.0

optimizer:
  population: 32
  elite: 8
  sigma: 0.6
  sigma_decay: 0.97
  init_scale: 0.3
  generations: 60
  seed: 1

output_dir: runs
